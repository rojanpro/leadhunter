services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lead_hunter
      POSTGRES_USER: lead_hunter
      POSTGRES_PASSWORD: lead_hunter
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lead_hunter -d lead_hunter"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file:
      - .env.example
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && python -m app.db.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "${BACKEND_PORT:-8001}:8000"

  worker:
    build: ./backend
    env_file:
      - .env.example
      - path: .env
        required: false
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      disable: true
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO --concurrency=2

  scheduler:
    build: ./backend
    env_file:
      - .env.example
      - path: .env
        required: false
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      disable: true
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=INFO

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    ports:
      - "${HTTP_PORT:-8080}:80"

volumes:
  postgres_data:
  redis_data:
